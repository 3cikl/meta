[env]
CLAUDE_CONFIG_DIR = "{{ config_root }}/.local/agents/claude"
PI_CODING_AGENT_DIR = "{{ config_root }}/.local/agents/pi"
CODEX_HOME = "{{ config_root }}/.local/agents/codex"

_.python.venv = ".venv"
_.path = [
    "{{ config_root }}/bin",
    "{{ config_root }}/.venv/bin",
    "{{ config_root }}/node_modules/.bin",
]

[tools]
python = "3.14"
uv = "0.11.7"
bun = "1.3.12"
"aqua:cli/cli" = "2.90.0"
"aqua:koalaman/shellcheck" = "0.11.0"
"aqua:cocogitto/cocogitto" = "7.0.0"
"aqua:aquasecurity/trivy" = "0.70.0"
"aqua:jesseduffield/lazygit" = "0.61.1"
"aqua:anthropics/claude-code" = "2.1.112"
