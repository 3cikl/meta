---
services:
  litellm-db:
    image: docker.io/postgres:16.6-alpine
    restart: always
    environment:
      - POSTGRES_USER=${LITELLM_DB_USERNAME}
      - POSTGRES_PASSWORD=${LITELLM_DB_PASSWORD}
      - POSTGRES_DB=${LITELLM_DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${LITELLM_DB_DATABASE} -U ${LITELLM_DB_USERNAME}"]
      interval: 1s
      timeout: 5s
      retries: 10
  litellm-proxy:
    image: docker.litellm.ai/berriai/litellm:v1.83.7-stable
    volumes:
      - .config/litellm/litellm.yaml:/app/litellm.yaml:ro,z
    command:
      - "--config=/app/litellm.yaml"
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${LITELLM_DB_URL}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_OPENROUTER_API_KEY=${LITELLM_OPENROUTER_API_KEY}
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  litellm-prometheus:
    image: docker.io/prom/prometheus:v3.11.2
    volumes:
      - litellm-prometheus-data:/prometheus
      - .config/litellm/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro,z
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    restart: always
    depends_on:
      litellm-db:
        condition: service_healthy
      litellm-proxy:
        condition: service_healthy
volumes:
  litellm-prometheus-data:
    driver: local
  litellm-db-data:
    driver: local
